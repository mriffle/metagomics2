version: '3.8'

services:
  metagomics2:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ${METAGOMICS_DATA_DIR:-./_data}:/data
      - ${METAGOMICS_DATABASES_DIR:-./_databases}:/databases:ro
      - ${METAGOMICS_CONFIG_DIR:-./config}:/config:ro
    environment:
      - METAGOMICS_DATA_DIR=/data
      - METAGOMICS_DATABASES_DIR=/databases
      - METAGOMICS_CONFIG_DIR=/config
      - METAGOMICS_THREADS=${METAGOMICS_THREADS:-4}
      - METAGOMICS_ADMIN_PASSWORD=${METAGOMICS_ADMIN_PASSWORD:-changeme}
      - METAGOMICS_MAX_UPLOAD_MB=${METAGOMICS_MAX_UPLOAD_MB:-1024}
      - METAGOMICS_CLEANUP_ON_SUCCESS=${METAGOMICS_CLEANUP_ON_SUCCESS:-true}
      - METAGOMICS_CLEANUP_ON_FAILURE=${METAGOMICS_CLEANUP_ON_FAILURE:-true}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SITE_URL=${SITE_URL:-}
    restart: unless-stopped
