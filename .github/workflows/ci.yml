name: CI

on:
  push:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create virtual environment
        run: python -m venv venv
      - name: Install Python dependencies
        run: |
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -m pip install -e ".[dev]"
      - name: Run Python tests
        run: ./venv/bin/python -m pytest tests/

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend test image
        run: docker build --target frontend-builder -t metagomics2-frontend-test .
      - name: Run TypeScript checks
        run: docker run --rm metagomics2-frontend-test npx tsc --noEmit
      - name: Run frontend tests
        run: docker run --rm metagomics2-frontend-test npx vitest run

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t metagomics2-ci:${{ github.sha }} --build-arg VERSION=ci-${{ github.sha }} .
      - name: Run CLI help smoke test
        run: docker run --rm metagomics2-ci:${{ github.sha }} --help
